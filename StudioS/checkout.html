<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudioS</title>
    <link rel="stylesheet" href="../Css/main.css" />
    <script src="../js/main.js" defer></script>
    <script src="../js/checkout.js" defer></script>
  </head>

  <body>
    <div class="wrapper">
      <nav class="logo">
        <a href="homepage.html">
          <img src="/img/StudioS.png" alt="logotype studioS" class="logotype" />
        </a>
      </nav>

      <div class="right-menu">
        <button class="menu-button">
          <img src="/img/menu.png" alt="Menu" />
        </button>
        <div class="dropdown-menu">
          <a href="#"><b>Category</b></a>
          <a href="dresses.html">Dresses</a>
          <a href="#">Tops</a>
          <a href="#">Bottom</a>
          <a href="#">Outwear</a>
        </div>
      </div>
    </div>

    <header class="header">
      <nav class="bag">
        <button class="bag-button">
          <img src="/img/bag.png" alt="Bag" class="bag-icon" />
        </button>
      </nav>
    </header>

    <main class="checkout-container">
      <section class="checkout-left">
        <h3>CHECKOUT</h3>

        <form>
          <input type="text" placeholder="First Name" required />
          <input type="text" placeholder="Last Name" required />
          <input type="text" placeholder="Email" required />
          <input type="text" placeholder="Address" required />
          <input type="text" placeholder="Postcode" required />
          <input type="text" placeholder="State" required />
        </form>

        <h3>PAYMENT</h3>
        <button class="checkout-button">APPLE PAY</button>
        <button class="checkout-button">PAYPAL</button>

        <div>
          <button class="checkout-button">Pay Now</button>
        </div>
      </section>

      <section class="checkout-right">
        <h3>ORDER SUMMARY</h3>

        <div class="product-row">
          <img src="/img/dress4.png" alt="Sara Dress" />

          <div class="product-text">
            <p id="dressName">Sara Dress</p>
            <p id="dressSize"></p>
            <p>Quantity: 1</p>
          </div>
        </div>

        <div class="summary-row">
          <span>Items:</span>
          <span>1</span>
        </div>

        <div class="summary-row">
          <span>Total:</span>
          <span>799 SEK</span>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-left">
          <a href="about.html" class="about-link">ABOUT US</a>
          <p class="shipping">SHIPPING</p>
          <p>RETURNS</p>
          <p>ACCESSIBILITY</p>
        </div>

        <div class="footer-right">
          <p class="social-title">SOCIAL MEDIA</p>

          <div class="social-item">
            <img
              src="/img/Instagram_icon.png"
              alt="Instagram"
              class="social-icon"
            />
            <span>@STUDIOS</span>
          </div>

          <div class="social-item">
            <img src="/img/tiktok_icon.png" alt="TikTok" class="social-icon" />
            <span>@STUDIOS</span>
          </div>
        </div>
      </div>

      <p class="copyright">&copy;Studio S</p>
    </footer>

    <div id="cartOverlay" class="cart-overlay">
      <div class="cart-drawer">
        <h2>Your Cart</h2>

        <div class="cart-item">
          <img src="/img/dress4.png" alt="Sara Dress" />

          <div>
            <p>Sara Dress</p>
            <p id="cartSize"></p>
            <p id="cartPrice">799 SEK</p>

            <div>
              <button id="minusBtn">-</button>
              <span id="cartQuantity">1</span>
              <button id="plusBtn">+</button>
              <button id="removeBtn">Remove</button>
            </div>
          </div>
        </div>

        <div class="cart-bottom">
          <p>Subtotal: <span id="cartTotal">799 SEK</span></p>

          <a href="checkout.html">
            <button class="cart-checkout-btn">Checkout</button>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>

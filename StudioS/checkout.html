<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudioS</title>
    <link rel="stylesheet" href="../Css/main.css" />
    <script src="../js/main.js" defer></script>
  </head>

  <body>
    <div class="wrapper">
      <div class="logo">
        <h2>LOGO</h2>
      </div>
      <div class="right-menu">
        <button class="menu-button">
          <img src="/img/menu.png" alt="Menu" />
        </button>
        <div class="dropdown-menu">
          <a href="#"><b>Category</b></a>
          <a href="#">Dresses</a>
          <a href="#">Tops</a>
          <a href="#">Bottom</a>
          <a href="#">Outwear</a>
        </div>
      </div>
    </div>
    <header class="header">
      <nav class="logo">
        <a href="homepage.html">
          <img src="/img/StudioS.png" alt="logotype studioS" class="logotype" />
        </a>
      </nav>

      <nav class="bag">
        <img src="/img/bag.png" alt="Bag" class="bag-icon" />
      </nav>
    </header>

    <section class="checkout-left">
      <h3>CHECKOUT</h3>

      <form>
        <input type="text" placeholder="First Name" required />
        <input type="text" placeholder="Last Name" required />
        <input type="text" placeholder="Email" required />
        <input type="text" placeholder="Address" required />
        <input type="text" placeholder="Postcode" required />
        <input type="text" placeholder="State" required />
      </form>

      <h3>PAYMENT</h3>
      <button class="checkout-button">APPLE PAY</button>
      <button class="checkout-button">PAYPAL</button>

      <div>
        <button class="checkout-button">Pay Now</button>
      </div>
    </section>

    <section class="checkout-right">
      <h3>ORDER SUMMARY</h3>

      <img src="" alt="product-bild" />
      <p>Product name</p>
      <p>Size</p>
      <p>Quantity: 1</p>

      <p>items: 1</p>
      <p>Total: "Price" SEK</p>
    </section>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-left">
          <p>ABOUT US</p>
          <p>SHIPPING</p>
          <p>RETURNS</p>
          <p>ACCESSIBILITY</p>
        </div>

        <div class="footer-right">
          <p>SOCIAL MEDIA</p>
          <p>@STUDIOS</p>
          <p>@STUDIOS</p>
        </div>
      </div>

      <p>&copy;Studio S</p>
    </footer>
  </body>
</html>
